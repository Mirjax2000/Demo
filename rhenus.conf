server {
    listen 80;
    server_name tvuj-server.cz;
    # Přesměrování všech HTTP na HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tvuj-server.cz;

    ssl_certificate /etc/letsencrypt/live/tvuj-server.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tvuj-server.cz/privkey.pem;

    # Bezpečnostní SSL nastavení (dá se rozšířit)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Statické soubory
    location /static/ {
        alias /var/www/RHENUS/Demo/staticfiles/;
    }

    # Media soubory (např. uploady)
    location /media/ {
        alias /var/www/RHENUS/Demo/media/;
    }

    # Proxy na Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
