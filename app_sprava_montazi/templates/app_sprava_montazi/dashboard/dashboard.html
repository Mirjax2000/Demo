    {% comment %} <script>
            document.addEventListener("DOMContentLoaded", function () {
                const ctx = document.querySelector("#mychart");

                const data = {
                    labels: [1, 2, 3],
                    datasets: [{
                        data: [100, 120, 150],
                        label: "Value"
                    }]
                };

                const myChart = new Chart(ctx, {
                    type: 'polarArea',
                    data: data
                });
            });
    </script> {% endcomment %}
