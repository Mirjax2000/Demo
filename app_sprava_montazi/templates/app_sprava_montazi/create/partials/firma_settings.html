<fieldset class="L-form__fieldset">
    <legend>
        <i class="fa-solid fa-file-import me-2"></i>Upravit Firmu
    </legend>
    <form method="post">
        {% csrf_token %}
        <ul class="list-unstyled">
            {% for nazev, name in firma.data.items %}
                <li class="L-form__group">
                    <label>{{ nazev }}:</label>
                    <input type="text"
                           name="ceny_montaze_{{ nazev }}"
                           value="{{ name }}"
                           required>
                </li>
            {% endfor %}
        </ul>
        <div class="u-txt-right">
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-plus me-2"></i>Uložit změny
            </button>
        </div>
    </form>
</fieldset>
