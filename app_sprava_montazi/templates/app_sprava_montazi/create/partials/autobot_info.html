<div class="accordion accordion-flush" id="accordionFlushExample">
    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button collapsed"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#flush-collapseOne"
                    aria-expanded="false"
                    aria-controls="flush-collapseOne">Nastavení Autobota</button>
        </h2>
        <div id="flush-collapseOne"
             class="accordion-collapse collapse"
             data-bs-parent="#accordionFlushExample">
            <div class="accordion-body">
                <p class="mb-1" id="autobotTokken">
                    <strong>TOKEN</strong> = "{{ tokken }}"
                </p>
                <p class="mb-1" id="autobotUrlGet">
                    <strong>API_URL_GET</strong> = "http://{{ url }}/api/incomplete-customers/"
                </p>
                <p class="mb-1" id="autobotUrlUpdate">
                    <strong>API_URL_UPDATE</strong> = "http://{{ url }}/api/update-customers/"
                </p>
                <hr class="m-2">
                <p class="btn btn-sm btn-primary" id="copyBtnAutobot">
                    <i class="fa-solid fa-copy me-2"></i>copy
                </p>
                
            </div>
        </div>
    </div>
</div>
