{% if order.status == "Hidden" %}
    <div class="form-check form-switch mb-1">
        <input class="form-check-input"
               type="checkbox"
               role="switch"
               id="checkBoxDeleteOrder"
               aria-checked="false">
        <label class="form-check-label" for="checkBoxDeleteOrder">Opravdu smazat?</label>
    </div>
    <!---->
    <form method="post" action="{% url 'delete_order' order.pk %}">
        {% csrf_token %}
        <button type="submit"
                id="deleteOrderButton"
                class="btn btn-danger btn-sm u-width-180 text-nowrap me-2 disabled">
            <i class="fa-solid fa-trash me-2"></i>Smazat objednávku
        </button>
    </form>
{% endif %}
