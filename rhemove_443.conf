# HTTPS server poslouchá na portu 443 s SSL/TLS
server {
    listen 443 ssl http2;             # http2 pro rychlejší načítání
    server_name rhemove.cz www.rhemove.cz;

    client_max_body_size 10M;         # maximální velikost uploadu 10 MB

    # Cesty k SSL certifikátu a klíči vystaveným Certbotem (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/rhemove.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rhemove.cz/privkey.pem;

    # Povolené TLS protokoly (bez starých verzí)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;     # preferovat serverové šifry
    ssl_ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384";

    ssl_session_cache shared:SSL:10m; # cache session pro rychlejší opětovné připojení
    ssl_session_tickets off;          # vypnutí session tickets pro bezpečnost

    # Bezpečnostní hlavičky, které zvyšují ochranu prohlížeče
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;  # vynucení HTTPS po dobu 1 roku
    add_header X-Frame-Options "DENY" always;             # blokuje iframe, zabraňuje clickjackingu
    add_header X-Content-Type-Options "nosniff" always;   # zabrání MIME sniffingu
    add_header Referrer-Policy "same-origin" always;      # neposílá referrer mimo vlastní doménu
    add_header Cross-Origin-Opener-Policy "same-origin" always; # chrání proti některým cross-origin útokům
    add_header Content-Security-Policy "default-src 'self' ; style-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always; # řízení odkud se načítají zdroje
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), fullscreen=(self)" always;

    # Podpora Let's Encrypt ověření přes HTTPS (stejné jako u HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Statické soubory - CSS, JS, obrázky
    location /static/ {
        alias /var/www/RHENUS/Demo/staticfiles/; # cesta k souborům
        expires 30d;                             # nastavení cache na 30 dní
        access_log off;                          # zruší logování přístupů pro tyto soubory (méně zápisu do logu)
    }

    # Media soubory - uploady, obrázky apod.
    location /media/ {
        alias /var/www/RHENUS/Demo/media/;
        expires 30d;
        access_log off;
    }

    # Proxy pass na Gunicorn server (tvůj Django backend)
    location / {
        proxy_pass http://127.0.0.1:8000;       # přeposílá požadavky na Gunicorn
        proxy_set_header Host $host;             # předá originální hostitel (doménu)
        proxy_set_header X-Real-IP $remote_addr; # IP klienta
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # IP řetězec (proxy info)
        proxy_set_header X-Forwarded-Proto $scheme; # zda je požadavek přes http/https

        proxy_redirect off;                      # zamezí automatickým přesměrováním
    }
}
